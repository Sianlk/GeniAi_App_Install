name: Diagnostic Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run diagnostic script
        run: python3 scripts/diagnostic_report.py
      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: diagnostic_report
          path: diagnostic_report.txt
