name: Self-Heal Pipeline
on:
  push:
    branches: [ main ]
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Node.js dependencies
        run: npm ci || npm install

      - name: Install Python dependencies
        run: pip install black

      - name: Run Prettier & ESLint auto-fix
        run: |
          npx prettier --write .
          npx eslint . --fix

      - name: Run Python Black auto-fix
        run: black .

      - name: Commit changes if any
        run: |
          git config --global user.name 'AutoFixBot'
          git config --global user.email 'autofix@bot.com'
          git add .
          git diff-index --quiet HEAD || git commit -m '🤖 Auto-fixed codebase'
          git push
