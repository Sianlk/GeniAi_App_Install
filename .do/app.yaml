name: unified-ai-ecosystem
region: lon
services:
  - name: backend
    dockerfile_path: backend/Dockerfile
    source_dir: /
    github:
      repo: Sianlk/GeniAi_App_Install
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: SUPER_ADMIN_EMAIL
        value: hosturserver@gmail.com

workers:
  - name: workforce
    dockerfile_path: backend/Dockerfile
    source_dir: /
    run_command: npm run worker
    instance_count: 1
    instance_size_slug: basic-xs

databases:
  - name: unified-ai-db
    engine: PG
    version: "16"
