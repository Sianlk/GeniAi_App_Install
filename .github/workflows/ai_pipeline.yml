name: AI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up AI environment
        run: |
          pip install torch transformers
      - name: Run AI jobs
        run: python3 core/ai_orchestrator/ai_orchestrator.py
