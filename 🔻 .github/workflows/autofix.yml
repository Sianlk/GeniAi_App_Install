name: Auto-Fix Code

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install formatters
        run: pip install black flake8 && npm install prettier eslint
      - name: Run auto-fix scripts
        run: |
          python3 scripts/autofix_files.py
          black .
          prettier --write .
          flake8 .
          eslint .
      - name: Commit and push fixes
        run: |
          git config --global user.name "AutoFixBot"
          git config --global user.email "autofix@bot.com"
          git add .
          git commit -m "Automated fixes"
          git push
