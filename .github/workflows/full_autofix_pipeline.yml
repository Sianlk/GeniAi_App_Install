name: Full AutoFix Pipeline

on:
  push:
    branches: [main]

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Python & Node
        run: |
          pip install black flake8
          npm install -g prettier eslint
      - name: Run linters + formatters
        run: |
          black .
          flake8 .
          prettier --write .
          eslint .
      - name: Commit fixes
        run: |
          git config --global user.name "AutoFixBot"
          git config --global user.email "autofix@bot.com"
          git add .
          git commit -m "Automated autofix commit"
          git push
