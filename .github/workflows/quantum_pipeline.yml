name: Quantum Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quantum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Qiskit
        run: pip install qiskit
      - name: Run quantum tasks
        run: python3 core/quantum/quantum_tasks.py
