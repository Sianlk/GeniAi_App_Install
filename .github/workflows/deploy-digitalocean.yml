name: Deploy to DigitalOcean App Platform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  APP_NAME: geniai-production

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt pytest httpx pytest-asyncio aiosqlite
      - run: pytest tests/ -v --tb=short -x --ignore=tests/load_test.js
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test

  deploy:
    name: Deploy to DigitalOcean
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://geniai.sianlk.com
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy App Platform spec
        run: |
          APP_ID=$(doctl apps list --no-header --format ID,Name 2>/dev/null | grep "${{ env.APP_NAME }}" | awk '{print $1}' || true)
          if [ -z "$APP_ID" ]; then
            echo "Creating new app..."
            doctl apps create --spec .do/app.yaml --wait
          else
            echo "Updating app $APP_ID..."
            doctl apps update "$APP_ID" --spec .do/app.yaml --wait
            doctl apps create-deployment "$APP_ID" --wait
          fi
          echo "Deployment complete"
