name: Deploy In-House Hybrid + Quantum App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/sianlk/geniai:latest
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Build and push quantum core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.quantum
          push: true
          tags: ghcr.io/sianlk/geniai-quantum:latest

      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/sianlk/geniai:latest
            docker pull ghcr.io/sianlk/geniai-quantum:latest
            docker compose down
            docker compose up -d --build
