version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: unified_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  workforce:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["npm", "run", "worker"]
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - postgres

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
