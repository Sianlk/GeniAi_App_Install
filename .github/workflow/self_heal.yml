name: Self-Heal Pipeline
on:
  push:
    branches: [ main ]
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Prettier & ESLint auto-fix
        run: |
          npm install
          npx prettier --write .
          npx eslint . --fix || true
      - name: Auto-fix Python
        run: |
          pip install black
          black . || true
      - name: Commit changes
        run: |
          git config --global user.name 'AutoFixBot'
          git config --global user.email 'autofix@bot.com'
          git add .
          git commit -m '🤖 Auto-fixed codebase' || echo 'No changes to commit'
          git push
