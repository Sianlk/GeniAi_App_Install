version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inhouse_app
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  quantum:
    build:
      context: .
      dockerfile: Dockerfile.quantum
    container_name: quantum_core
    ports:
      - "9000:9000"
    environment:
      - AI_CORE=phi-3-quantum-4k
      - OMNI_LICENSE=${OMNI_LICENSE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
