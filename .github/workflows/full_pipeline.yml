name: Full Production Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker
        run: docker-compose build
      - name: Run tests
        run: pytest
      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/kubernetes.yaml
      - name: Notify
        run: echo "🚀 Full pipeline deployed successfully."
