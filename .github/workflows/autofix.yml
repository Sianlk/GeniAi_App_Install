name: Auto-Fix Code

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python and Node.js
        run: |
          pip install black flake8
          npm install prettier eslint
      - name: Run auto-fix tools
        run: |
          python3 scripts/autofix_files.py
          black .
          flake8 .
          prettier --write .
          eslint .
      - name: Commit fixes
        run: |
          git config --global user.name "AutoFixBot"
          git config --global user.email "autofix@bot.com"
          git add .
          git commit -m "Auto-fix: formatting and linting"
          git push
