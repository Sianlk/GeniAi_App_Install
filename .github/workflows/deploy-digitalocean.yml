name: Deploy to DigitalOcean App Platform

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  APP_NAME: geniai-production

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://geniai.sianlk.com
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy App Platform spec
        run: |
          APP_ID=$(doctl apps list --no-header --format ID,Name 2>/dev/null \
            | grep "${{ env.APP_NAME }}" | awk '{print $1}' || true)
          if [ -z "$APP_ID" ]; then
            echo "Creating new DigitalOcean App..."
            doctl apps create --spec .do/app.yaml --wait
          else
            echo "Updating existing app $APP_ID..."
            doctl apps update "$APP_ID" --spec .do/app.yaml --wait
            doctl apps create-deployment "$APP_ID" --wait
          fi
          echo "Deployment complete"
